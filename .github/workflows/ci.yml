name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  infra:
    name: Terraform and Ansible checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform format
        run: terraform -chdir=terraform fmt -check

      - name: Initialize Terraform without backend
        run: terraform -chdir=terraform init -backend=false

      - name: Validate Terraform
        run: terraform -chdir=terraform validate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Ansible
        run: python -m pip install --upgrade ansible

      - name: Check Ansible syntax
        run: ansible-playbook -i ansible/inventory.example.ini ansible/site.yml --syntax-check

  build:
    name: Build and healthcheck
    runs-on: ubuntu-latest
    needs: infra

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: todo_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d todo_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/todo_db?schema=public
      PORT: 3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Push database schema
        run: npm run db:push

      - name: Seed database
        run: npm run db:seed

      - name: Start API and check health
        run: |
          npm start &
          SERVER_PID=$!

          for attempt in {1..30}; do
            if curl --fail http://localhost:3000/health; then
              kill "$SERVER_PID"
              exit 0
            fi
            sleep 2
          done

          kill "$SERVER_PID"
          exit 1
