name: Deploy Cargo API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
      APP_PORT: ${{ vars.APP_PORT || '3000' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'postgres' }}
      SEED_DATABASE: ${{ vars.SEED_DATABASE || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check EC2 secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ] || [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "EC2_HOST or EC2_SSH_KEY is not configured."
            echo "Add them in GitHub: Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Ansible and rsync
        run: |
          python -m pip install --upgrade pip
          pip install ansible
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Create Ansible inventory
        run: |
          cat > inventory.ini <<EOF
          [cargo_api]
          api ansible_host=${{ secrets.EC2_HOST }} ansible_user=${EC2_USER} ansible_ssh_private_key_file=$HOME/.ssh/ec2_key
          EOF

      - name: Check Ansible syntax
        run: ansible-playbook -i inventory.ini ansible/deploy.yml --syntax-check

      - name: Deploy with Ansible
        run: ansible-playbook -i inventory.ini ansible/deploy.yml
